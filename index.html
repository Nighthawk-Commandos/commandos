<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNI:C Commandos Mainframe</title>
    <link rel="icon" href="https://i.imgur.com/YA7Ilep.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css?v=2">
</head>
<body>

<div id="loading">
    <div class="lt">TNI:C</div>
    <div class="spinner"></div>
    <div class="ls" id="loading-status">Loading mainframe…</div>
</div>

<div id="hbg"><span></span><span></span><span></span></div>

<div id="app">
    <aside id="sidebar">
        <div class="sidebar-logo">
            <div class="label">TNI Commandos</div>
            <div class="title">Commandos<br>Mainframe</div>
        </div>
        <div class="sidebar-actions">
            <button id="refresh-btn">↻ Refresh Data</button>
        </div>
        <nav>
            <div class="nav-group">Overview</div>
            <div class="nav-item active" data-key="settings"      ><span class="nav-dot"></span>Settings</div>
            <div class="nav-group">Trackers</div>
            <div class="nav-item" data-key="activity"             ><span class="nav-dot"></span>Activity Tracker</div>
            <div class="nav-item" data-key="officers"             ><span class="nav-dot"></span>Officer Tracker</div>
            <div class="nav-item" data-key="honored"              ><span class="nav-dot"></span>Honored Tracker</div>
            <div class="nav-item" data-key="departments"          ><span class="nav-dot"></span>Department Members</div>
            <div class="nav-group">Events</div>
            <div class="nav-item" data-key="weekly"               ><span class="nav-dot"></span>Weekly Events</div>
            <div class="nav-item" data-key="monthly"              ><span class="nav-dot"></span>Monthly Events</div>
            <div class="nav-group">Forms</div>
            <div class="nav-item" data-key="form-eventlog"        ><span class="nav-dot"></span>Event Log</div>
            <div class="nav-item" data-key="form-editeventlog"    ><span class="nav-dot"></span>Edit Event Log</div>
            <div class="nav-item" data-key="form-transfer"        ><span class="nav-dot"></span>Stats Transfer</div>
            <div class="nav-item" data-key="form-exemption"       ><span class="nav-dot"></span>Exemption</div>
            <div class="nav-item" data-key="form-missingap"       ><span class="nav-dot"></span>Missing AP</div>
        </nav>
    </aside>
    <main id="main"><div id="content"></div></main>
</div>

<div class="toast" id="toast"></div>

<!-- Load order matters: config → api → render → forms → app -->
<script src="./js/config.js?v=2"></script>
<script src="./js/api.js?v=2"></script>
<script src="./js/render.js?v=2"></script>
<script src="./js/forms.js?v=2"></script>
<script src="./js/app.js?v=2"></script>
</body>
</html>
