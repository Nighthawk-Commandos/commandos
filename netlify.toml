# netlify.toml

[build]
publish = "."
command = "npm install"

[build.environment]
NODE_VERSION = "20"

# ── Auth API redirects (must be before the SPA catch-all) ──────
[[redirects]]
from   = "/api/auth/discord"
to     = "/.netlify/functions/auth-login"
status = 200

[[redirects]]
from   = "/api/auth/discord/callback"
to     = "/.netlify/functions/auth-callback"
status = 200

[[redirects]]
from   = "/api/auth/me"
to     = "/.netlify/functions/auth-me"
status = 200

[[redirects]]
from   = "/api/auth/logout"
to     = "/.netlify/functions/auth-logout"
status = 200

[[redirects]]
from   = "/api/admin/allowlist"
to     = "/.netlify/functions/admin-allowlist"
status = 200

# ── Callback API redirects ──────────────────────────────────────
[[redirects]]
from   = "/api/callback/review"
to     = "/.netlify/functions/callback-review"
status = 200

[[redirects]]
from   = "/api/callback/process"
to     = "/.netlify/functions/callback-process"
status = 200

# ── DIS API redirects ───────────────────────────────────────────
[[redirects]]
from   = "/api/dis/state"
to     = "/.netlify/functions/dis-state"
status = 200

[[redirects]]
from   = "/api/dis/sync"
to     = "/.netlify/functions/dis-sync"
status = 200

[[redirects]]
from   = "/api/dis/admin"
to     = "/.netlify/functions/dis-admin"
status = 200

[[redirects]]
from   = "/api/dis/gamepool"
to     = "/.netlify/functions/dis-gamepool"
status = 200

# ── SPA fallback ───────────────────────────────────────────────
[[redirects]]
from   = "/*"
to     = "/index.html"
status = 200

# ── Cache headers ──────────────────────────────────────────────
[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/config.js"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# ── Security headers ───────────────────────────────────────────
# 'unsafe-inline' is required because dynamic HTML strings in render.js / forms.js
# use inline onclick/onchange attributes. See render.js filterBtn(), buildAC(), etc.
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options        = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy        = "strict-origin-when-cross-origin"
Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' https://i.imgur.com data:; connect-src 'self' https://script.google.com https://script.googleusercontent.com;"
