from   = "/api/auth/apply"
to     = "/.netlify/functions/auth-apply"
status = 200

[[redirects]]
from   = "/api/auth/discord"
to     = "/.netlify/functions/auth-login"
status = 200

[[redirects]]
from   = "/api/auth/discord/callback"
to     = "/.netlify/functions/auth-callback"
status = 200

[[redirects]]
from   = "/api/auth/me"
