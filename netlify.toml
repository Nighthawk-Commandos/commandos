# ── Policy pages ──────────────────────────────────────────────
[[redirects]]
from   = "/privacy"
to     = "/privacy.html"
status = 200

[[redirects]]
from   = "/tos"
to     = "/tos.html"
status = 200

# ── Root → app ─────────────────────────────────────────────────
[[redirects]]
from   = "/"
to     = "/index.html"
status = 200

# ── Everything else → meme 404 ─────────────────────────────────
[[redirects]]
from   = "/*"
to     = "/404.html"
status = 404

# ── Asset headers ──────────────────────────────────────────────
[[headers]]
for = "/assets/PageTopBanner"
[headers.values]
Content-Type = "image/svg+xml"
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/assets/PageBottomBanner"
[headers.values]
Content-Type = "image/svg+xml"
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=86400"

# ── Cache headers ──────────────────────────────────────────────
[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/js/*"
[headers.values]
Cache-Control = "no-cache, must-revalidate"

[[headers]]
for = "/dist/*"
[headers.values]
Cache-Control = "no-cache, must-revalidate"

[[headers]]
for = "/css/*"
[headers.values]
Cache-Control = "no-cache, must-revalidate"

# ── Security headers ───────────────────────────────────────────
# 'unsafe-inline' is required because dynamic HTML strings in render.js / forms.js
# use inline onclick/onchange attributes. See render.js filterBtn(), buildAC(), etc.
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options        = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy        = "strict-origin-when-cross-origin"
Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://themes.googleusercontent.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' https://i.imgur.com https://cdn.discordapp.com https://media.discordapp.net data: blob:; connect-src 'self';"